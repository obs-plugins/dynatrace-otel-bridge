receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  resource:
    attributes:
      - key: deployment.environment
        value: ${env:DEPLOYMENT_ENVIRONMENT:-development}
        action: upsert
  cumulativetodelta: {}
  # Dify nativo (ENABLE_OTEL) emite gen_ai.response.finish_reason como string
  # singular; a convenção oficial é gen_ai.response.finish_reasons (array).
  # Migra o valor para o atributo em array e remove o singular, para
  # conformidade com as OTel GenAI Semantic Conventions v1.37. Só atua nos
  # spans onde o atributo singular existe.
  transform/genai_finish_reasons:
    trace_statements:
      - context: span
        statements:
          - set(attributes["gen_ai.response.finish_reasons"], [attributes["gen_ai.response.finish_reason"]]) where attributes["gen_ai.response.finish_reason"] != nil
          - delete_key(attributes, "gen_ai.response.finish_reason") where attributes["gen_ai.response.finish_reason"] != nil
  # Dify nativo (ENABLE_OTEL) emite estes 4 atributos sob o namespace gen_ai.*,
  # mas não fazem parte da OTel GenAI Semantic Convention — são específicos do
  # Dify. Move-os para o namespace proprietário dify.*, preservando o valor,
  # e remove o original para não duplicar o dado.
  transform/genai_dify_namespace_cleanup:
    trace_statements:
      - context: span
        statements:
          - set(attributes["dify.span.kind"], attributes["gen_ai.span.kind"]) where attributes["gen_ai.span.kind"] != nil
          - delete_key(attributes, "gen_ai.span.kind") where attributes["gen_ai.span.kind"] != nil
          - set(attributes["dify.framework"], attributes["gen_ai.framework"]) where attributes["gen_ai.framework"] != nil
          - delete_key(attributes, "gen_ai.framework") where attributes["gen_ai.framework"] != nil
          - set(attributes["dify.user_id"], attributes["gen_ai.user.id"]) where attributes["gen_ai.user.id"] != nil
          - delete_key(attributes, "gen_ai.user.id") where attributes["gen_ai.user.id"] != nil
          - set(attributes["dify.time_to_first_token"], attributes["gen_ai.user.time_to_first_token"]) where attributes["gen_ai.user.time_to_first_token"] != nil
          - delete_key(attributes, "gen_ai.user.time_to_first_token") where attributes["gen_ai.user.time_to_first_token"] != nil
  # Duas lógicas distintas neste processor:
  # Lógica A (promoção condicional): gen_ai.prompt/gen_ai.completion são a
  # versão legada do MESMO conceito que gen_ai.input.messages/output.messages.
  # Se a versão nova ainda não existir, o valor legado é promovido para ela;
  # em qualquer caso o campo legado é removido no final (nunca mantemos as
  # duas versões do mesmo dado). A condição do delete_key roda depois do set,
  # por isso cobre tanto "acabou de ser promovido" como "já existiam ambos".
  # Lógica B (preservação sob namespace próprio): input.value/output.value são
  # a convenção Arize/OpenInference de "chain I/O" genérico — um conceito
  # DIFERENTE de gen_ai.input.messages/output.messages, não deve ser fundido
  # com ele. Só é renomeado para dify.io.*, preservando o valor.
  transform/genai_legacy_promotion:
    trace_statements:
      - context: span
        statements:
          - set(attributes["gen_ai.input.messages"], attributes["gen_ai.prompt"]) where attributes["gen_ai.input.messages"] == nil and attributes["gen_ai.prompt"] != nil
          - delete_key(attributes, "gen_ai.prompt") where attributes["gen_ai.input.messages"] != nil and attributes["gen_ai.prompt"] != nil
          - set(attributes["gen_ai.output.messages"], attributes["gen_ai.completion"]) where attributes["gen_ai.output.messages"] == nil and attributes["gen_ai.completion"] != nil
          - delete_key(attributes, "gen_ai.completion") where attributes["gen_ai.output.messages"] != nil and attributes["gen_ai.completion"] != nil
          - set(attributes["dify.io.input_value"], attributes["input.value"]) where attributes["input.value"] != nil
          - delete_key(attributes, "input.value") where attributes["input.value"] != nil
          - set(attributes["dify.io.output_value"], attributes["output.value"]) where attributes["output.value"] != nil
          - delete_key(attributes, "output.value") where attributes["output.value"] != nil
  # Dify nativo emite estes atributos sob namespaces não-oficiais:
  # - gen_ai.tool.call.result / gen_ai.tool.type: não fazem parte da
  #   convenção oficial gen_ai.tool.* (que cobre name/description/call.id/
  #   call.arguments, esses sim mantidos como estão); são extensões
  #   proprietárias do Dify.
  # - retrieval.query / retrieval.document: convenção de retrieval ainda
  #   imatura na spec oficial OTel GenAI (sem gen_ai.retrieval.* estável);
  #   preservamos sob dify.* e reavaliamos quando estabilizar.
  # Mesma regra de ouro das fatias anteriores: preserva o valor sob dify.*,
  # remove o original. Nunca perder dado.
  transform/genai_tool_retrieval_namespace:
    trace_statements:
      - context: span
        statements:
          - set(attributes["dify.tool.call.result"], attributes["gen_ai.tool.call.result"]) where attributes["gen_ai.tool.call.result"] != nil
          - delete_key(attributes, "gen_ai.tool.call.result") where attributes["gen_ai.tool.call.result"] != nil
          - set(attributes["dify.tool.type"], attributes["gen_ai.tool.type"]) where attributes["gen_ai.tool.type"] != nil
          - delete_key(attributes, "gen_ai.tool.type") where attributes["gen_ai.tool.type"] != nil
          - set(attributes["dify.retrieval.query"], attributes["retrieval.query"]) where attributes["retrieval.query"] != nil
          - delete_key(attributes, "retrieval.query") where attributes["retrieval.query"] != nil
          - set(attributes["dify.retrieval.document"], attributes["retrieval.document"]) where attributes["retrieval.document"] != nil
          - delete_key(attributes, "retrieval.document") where attributes["retrieval.document"] != nil
  # gen_ai.provider.name: o Dify nativo emite o valor CRU de model_provider,
  # que para providers instalados via plugin tem a forma
  # "{org}/{plugin}/{provider}" (ex.: "langgenius/groq/groq"). A convenção
  # oficial OTel GenAI e a app AI Observability do Dynatrace esperam o nome
  # limpo do provider ("groq", "openai", ...). Colapsamos para o último
  # segmento do path removendo tudo até à última barra (greedy). Valores já
  # limpos (sem barra) ficam inalterados. So corre quando o atributo existe.
  transform/genai_provider_name_normalize:
    trace_statements:
      - context: span
        statements:
          - replace_pattern(attributes["gen_ai.provider.name"], "^.*/", "") where attributes["gen_ai.provider.name"] != nil
  batch: {}

exporters:
  # Exporter principal: envia para o tenant Dynatrace via OTLP/HTTP.
  otlphttp/dynatrace:
    endpoint: ${env:DT_OTLP_ENDPOINT}
    headers:
      Authorization: "Api-Token ${env:DT_API_TOKEN}"
  # Útil durante o teste local: imprime um resumo do que passa no pipeline.
  debug:
    verbosity: normal

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, transform/genai_finish_reasons, transform/genai_dify_namespace_cleanup, transform/genai_legacy_promotion, transform/genai_tool_retrieval_namespace, transform/genai_provider_name_normalize, batch]
      exporters: [otlphttp/dynatrace, debug]
    metrics:
      receivers: [otlp]
      processors: [resource, cumulativetodelta, batch]
      exporters: [otlphttp/dynatrace, debug]
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/dynatrace, debug]
