receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  resource:
    attributes:
      - key: deployment.environment
        value: ${env:DEPLOYMENT_ENVIRONMENT:-development}
        action: upsert
  cumulativetodelta: {}
  batch: {}

exporters:
  # Exporter principal: envia para o tenant Dynatrace via OTLP/HTTP.
  otlphttp/dynatrace:
    endpoint: ${env:DT_OTLP_ENDPOINT}
    headers:
      Authorization: "Api-Token ${env:DT_API_TOKEN}"
  # Útil durante o teste local: imprime um resumo do que passa no pipeline.
  debug:
    verbosity: normal

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/dynatrace, debug]
    metrics:
      receivers: [otlp]
      processors: [resource, cumulativetodelta, batch]
      exporters: [otlphttp/dynatrace, debug]
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/dynatrace, debug]
