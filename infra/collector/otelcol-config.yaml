receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # Drops Dify console/infra HTTP noise spans (GET/POST /console/api/*, /health,
  # /openapi.json, /api/.env* scanner traffic, etc.) that Dify's HTTP
  # auto-instrumentation emits for ALL routes, not just GenAI ones. These spans
  # pollute the AI Observability app (e.g. "Invocation error count" inflated with
  # console 4xx while the real GenAI failure rate is 0%) and increase ingest
  # volume (Grail cost).
  # Discriminator (validated on real data): console spans HAVE an HTTP method
  # attribute; the spans we keep — workflow root and LLM nodes — are internal
  # and have no HTTP method.
  # Dify's Flask instrumentation emits the OLD HTTP dialect "http.method";
  # "http.request.method" is Grail's normalization applied AFTER the Collector,
  # so the raw attribute here is "http.method", not "http.request.method". We
  # cover both names so noise isn't let through depending on the instrumentation
  # version.
  # Triple safety net: only drop if it has an HTTP method (either dialect) AND no
  # gen_ai.request.model AND no dify.workflow_id, so we never accidentally catch
  # a span with a GenAI signal or the workflow anchor. Console spans are leaves
  # (not parents of nodes), so dropping them doesn't orphan the trace.
  filter/drop_dify_console_noise:
    error_mode: ignore
    trace_conditions:
      - (span.attributes["http.method"] != nil or span.attributes["http.request.method"] != nil) and span.attributes["gen_ai.request.model"] == nil and span.attributes["dify.workflow_id"] == nil
  resource:
    attributes:
      - key: deployment.environment
        value: ${env:DEPLOYMENT_ENVIRONMENT:-development}
        action: upsert
  cumulativetodelta: {}
  # Dify native (ENABLE_OTEL) emits gen_ai.response.finish_reason as a singular
  # string; the official convention is gen_ai.response.finish_reasons (array).
  # Migrates the value into the array attribute and removes the singular one, for
  # compliance with OTel GenAI Semantic Conventions v1.37. Only acts on spans
  # where the singular attribute exists.
  transform/genai_finish_reasons:
    trace_statements:
      - context: span
        statements:
          - set(attributes["gen_ai.response.finish_reasons"], [attributes["gen_ai.response.finish_reason"]]) where attributes["gen_ai.response.finish_reason"] != nil
          - delete_key(attributes, "gen_ai.response.finish_reason") where attributes["gen_ai.response.finish_reason"] != nil
  # Dify native (ENABLE_OTEL) emits these 4 attributes under the gen_ai.*
  # namespace, but they are not part of the OTel GenAI Semantic Convention — they
  # are Dify-specific. Moves them to a dify.* namespace and removes the original
  # to avoid duplicating the data.
  transform/genai_dify_namespace_cleanup:
    trace_statements:
      - context: span
        statements:
          - set(attributes["dify.span.kind"], attributes["gen_ai.span.kind"]) where attributes["gen_ai.span.kind"] != nil
          - delete_key(attributes, "gen_ai.span.kind") where attributes["gen_ai.span.kind"] != nil
          - set(attributes["dify.framework"], attributes["gen_ai.framework"]) where attributes["gen_ai.framework"] != nil
          - delete_key(attributes, "gen_ai.framework") where attributes["gen_ai.framework"] != nil
          - set(attributes["dify.user_id"], attributes["gen_ai.user.id"]) where attributes["gen_ai.user.id"] != nil
          - delete_key(attributes, "gen_ai.user.id") where attributes["gen_ai.user.id"] != nil
          - set(attributes["dify.time_to_first_token"], attributes["gen_ai.user.time_to_first_token"]) where attributes["gen_ai.user.time_to_first_token"] != nil
          - delete_key(attributes, "gen_ai.user.time_to_first_token") where attributes["gen_ai.user.time_to_first_token"] != nil
  # Logic A (conditional promotion): gen_ai.prompt/gen_ai.completion are the
  # legacy version of the SAME concept as gen_ai.input.messages/output.messages.
  # If the new version doesn't exist yet, the legacy value is promoted to it; the
  # delete_key runs after the set (avoids keeping two versions of the same data).
  # Logic B (preservation under own namespace): input.value/output.value are the
  # Arize/OpenInference "chain I/O" convention — a DIFFERENT concept from
  # gen_ai.input.messages/output.messages, must not be merged.
  transform/genai_legacy_promotion:
    trace_statements:
      - context: span
        statements:
          - set(attributes["gen_ai.input.messages"], attributes["gen_ai.prompt"]) where attributes["gen_ai.input.messages"] == nil and attributes["gen_ai.prompt"] != nil
          - delete_key(attributes, "gen_ai.prompt") where attributes["gen_ai.input.messages"] != nil and attributes["gen_ai.prompt"] != nil
          - set(attributes["gen_ai.output.messages"], attributes["gen_ai.completion"]) where attributes["gen_ai.output.messages"] == nil and attributes["gen_ai.completion"] != nil
          - delete_key(attributes, "gen_ai.completion") where attributes["gen_ai.output.messages"] != nil and attributes["gen_ai.completion"] != nil
          - set(attributes["dify.io.input_value"], attributes["input.value"]) where attributes["input.value"] != nil
          - delete_key(attributes, "input.value") where attributes["input.value"] != nil
          - set(attributes["dify.io.output_value"], attributes["output.value"]) where attributes["output.value"] != nil
          - delete_key(attributes, "output.value") where attributes["output.value"] != nil
  # Dify native emits these attributes under non-official namespaces:
  # - gen_ai.tool.call.result / gen_ai.tool.type are not part of the official
  #   gen_ai.tool.* convention (which covers name/description/call.id/
  #   call.arguments — those ARE kept as-is); they are extensions.
  # - retrieval.query / retrieval.document: retrieval convention still immature
  #   in the official OTel GenAI spec (no stable gen_ai.retrieval.*).
  transform/genai_tool_retrieval_namespace:
    trace_statements:
      - context: span
        statements:
          - set(attributes["dify.tool.call.result"], attributes["gen_ai.tool.call.result"]) where attributes["gen_ai.tool.call.result"] != nil
          - delete_key(attributes, "gen_ai.tool.call.result") where attributes["gen_ai.tool.call.result"] != nil
          - set(attributes["dify.tool.type"], attributes["gen_ai.tool.type"]) where attributes["gen_ai.tool.type"] != nil
          - delete_key(attributes, "gen_ai.tool.type") where attributes["gen_ai.tool.type"] != nil
          - set(attributes["dify.retrieval.query"], attributes["retrieval.query"]) where attributes["retrieval.query"] != nil
          - delete_key(attributes, "retrieval.query") where attributes["retrieval.query"] != nil
          - set(attributes["dify.retrieval.document"], attributes["retrieval.document"]) where attributes["retrieval.document"] != nil
          - delete_key(attributes, "retrieval.document") where attributes["retrieval.document"] != nil
  # gen_ai.provider.name: Dify native emits the RAW model_provider value, which
  # for plugin-installed providers has the form "{org}/{plugin}/{provider}"
  # (e.g. "langgenius/groq/groq"). The official OTel GenAI convention and the
  # Dynatrace AI Observability app expect the clean provider name ("groq",
  # "openai", ...). We collapse to the last path segment by stripping everything
  # up to the last slash (greedy). Already-clean values (no slash) stay
  # unchanged. Only runs when the attribute exists.
  transform/genai_provider_name_normalize:
    trace_statements:
      - context: span
        statements:
          - replace_pattern(attributes["gen_ai.provider.name"], "^.*/", "") where attributes["gen_ai.provider.name"] != nil
  # gen_ai.operation.name: Dify native defines the constant but NEVER emits it
  # (the LLM parser sets model/provider/tokens/finish_reason but not operation).
  # The Dynatrace AI Observability app classifies a span as a "model operation"
  # based on gen_ai.operation.name; without it the model shows in the facet but
  # is NOT counted ("Number of models" widget stays at 0). The official GenAI
  # spec defines "chat" as the well-known value for a chat interaction with an
  # LLM. These spans have gen_ai.request.model and are LLM nodes, so they are
  # unambiguously chat operations. We only set it when request.model exists and
  # operation.name doesn't yet (don't overwrite if Dify ever emits its own
  # value).
  transform/genai_operation_name:
    trace_statements:
      - context: span
        statements:
          - set(attributes["gen_ai.operation.name"], "chat") where attributes["gen_ai.request.model"] != nil and attributes["gen_ai.operation.name"] == nil
  # gen_ai.response.model: Dify native only emits gen_ai.request.model (the LLM
  # parser writes model_name only to REQUEST_MODEL; there is no RESPONSE_MODEL in
  # its semconv). The Dynatrace AI Observability app counts "Number of models"
  # with countDistinct(gen_ai.response.model) — so without this field the widget
  # stays at 0 even with the model present in request.model. In Dify the model is
  # explicitly selected in the LLM node, with no routing/fallback/aliasing, so
  # request.model and response.model are by construction the same value; copying
  # reflects reality. Only runs when request.model exists and response.model
  # isn't set yet.
  transform/genai_response_model:
    trace_statements:
      - context: span
        statements:
          - set(attributes["gen_ai.response.model"], attributes["gen_ai.request.model"]) where attributes["gen_ai.request.model"] != nil and attributes["gen_ai.response.model"] == nil
  batch: {}

exporters:
  # Main exporter: sends to the Dynatrace tenant via OTLP/HTTP.
  otlphttp/dynatrace:
    endpoint: ${env:DT_OTLP_ENDPOINT}
    headers:
      Authorization: "Api-Token ${env:DT_API_TOKEN}"
  # Handy during local testing: prints a summary of what passes through the pipeline.
  debug:
    verbosity: normal

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, filter/drop_dify_console_noise, transform/genai_finish_reasons, transform/genai_dify_namespace_cleanup, transform/genai_legacy_promotion, transform/genai_tool_retrieval_namespace, transform/genai_provider_name_normalize, transform/genai_operation_name, transform/genai_response_model, batch]
      exporters: [otlphttp/dynatrace, debug]
    metrics:
      receivers: [otlp]
      processors: [resource, cumulativetodelta, batch]
      exporters: [otlphttp/dynatrace, debug]
    logs:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlphttp/dynatrace, debug]
