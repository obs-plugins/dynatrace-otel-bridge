services:
  otel-collector:
    # Imagem oficial Dynatrace, validada em produção (tenant SaaS).
    image: dynatrace/dynatrace-otel-collector:latest
    container_name: otel-collector
    restart: unless-stopped
    # Carrega DT_OTLP_ENDPOINT, DT_API_TOKEN e DEPLOYMENT_ENVIRONMENT para dentro
    # do container, onde o config do collector os expande via ${env:...}.
    env_file:
      - .env
    volumes:
      # O compose vive em examples/docker-compose/, por isso sobe 2 níveis até à
      # raiz do repo e entra em infra/collector/. Montado read-only.
      - ../../infra/collector/otelcol-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "13133:13133"   # health_check (opcional)
