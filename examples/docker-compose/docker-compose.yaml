services:
  otel-collector:
    # Official Dynatrace image, validated in production (SaaS tenant).
    image: dynatrace/dynatrace-otel-collector:latest
    container_name: otel-collector
    restart: unless-stopped
    # Loads DT_OTLP_ENDPOINT, DT_API_TOKEN and DEPLOYMENT_ENVIRONMENT into the
    # container, where the collector config expands them via ${env:...}.
    env_file:
      - .env
    volumes:
      # The compose file lives in examples/docker-compose/, so it goes up 2
      # levels to the repo root and into infra/collector/. Mounted read-only.
      - ../../infra/collector/otelcol-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "13133:13133"   # health_check (optional)
    networks:
      - dify-otel-net

networks:
  # Named network shared with the Dify stack (see
  # docker-compose.override.dify-example.yaml, at the repo root), so that Dify's
  # api/worker services can resolve "otel-collector" by name without merging the
  # two stacks into a single compose project.
  dify-otel-net:
    name: dify-otel-net
