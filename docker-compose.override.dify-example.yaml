# Override for the Dify self-hosted stack — the main integration of this repo
# (not "just another example": it is the companion compose for the Dify +
# Dynatrace bridge). It is NOT part of this repo's compose, which only brings up
# the collector.
#
# Installation: copy it into the docker/ directory of the Dify installation with
# the name docker-compose.override.yaml. Docker Compose automatically merges
# docker-compose.yaml + docker-compose.override.yaml when they are in the same
# folder (docker compose up applies both with no extra flags).
#
# Prerequisite: the "dify-otel-net" network must already exist. It is created by
# this repo's compose (examples/docker-compose/docker-compose.yaml) when the
# otel-collector comes up — just bring up the collector first, or once, on the
# same machine.

services:
  web:
    # Fix for the 502 on root: Next.js's standalone server.js binds using
    # process.env.HOSTNAME. Without this pinned, the container ends up binding
    # only to the interface of the network its hostname resolves to in
    # /etc/hosts — usually a single network, not all the ones the container is
    # attached to. Since nginx is only on the other networks, its connection to
    # web fails with "connection refused" (502). Forcing 0.0.0.0 makes the server
    # listen on all interfaces, regardless of network/hostname.
    environment:
      HOSTNAME: "0.0.0.0"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      OTEL_SERVICE_NAME: "dify-web"
    # default + ssrf_proxy_network keep web's original networks from Dify's
    # compose; dify-otel-net is not strictly necessary here (web does not talk to
    # the collector), but it is the production-validated configuration — kept for
    # parity with what has already run successfully.
    networks:
      - default
      - ssrf_proxy_network
      - dify-otel-net

  api:
    environment:
      ENABLE_OTEL: "true"
      OTLP_BASE_ENDPOINT: "http://otel-collector:4318"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      OTEL_SERVICE_NAME: "dify-api"
      OTEL_SAMPLING_RATE: "1.0"
    networks:
      - dify-otel-net

  worker:
    environment:
      ENABLE_OTEL: "true"
      OTLP_BASE_ENDPOINT: "http://otel-collector:4318"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      OTEL_SERVICE_NAME: "dify-worker"
      OTEL_SAMPLING_RATE: "1.0"
    networks:
      - dify-otel-net

  worker_beat:
    environment:
      ENABLE_OTEL: "true"
      OTLP_BASE_ENDPOINT: "http://otel-collector:4318"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4318"
      OTEL_EXPORTER_OTLP_PROTOCOL: "http/protobuf"
      OTEL_SERVICE_NAME: "dify-worker-beat"
      OTEL_SAMPLING_RATE: "1.0"
    networks:
      - dify-otel-net

networks:
  dify-otel-net:
    external: true
    name: dify-otel-net
