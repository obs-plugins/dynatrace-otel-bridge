# Override para a stack self-hosted da Dify — a integração principal deste
# repo (não é "mais um exemplo": é o companion compose da bridge Dify +
# Dynatrace). NÃO faz parte do compose deste repo, que só sobe o collector.
#
# Instalação: copiar para o diretório docker/ da instalação da Dify com o
# nome docker-compose.override.yaml. O Docker Compose funde automaticamente
# docker-compose.yaml + docker-compose.override.yaml quando estão na mesma
# pasta (docker compose up já aplica as duas sem flags extra).
#
# Pré-requisito: a rede "dify-otel-net" tem de já existir. Ela é criada pelo
# compose deste repo (examples/docker-compose/docker-compose.yaml) quando o
# otel-collector sobe — basta subir o collector antes, ou uma vez, na mesma
# máquina.

services:
  web:
    # Fix do 502 na raiz: o server.js standalone do Next.js faz bind usando
    # process.env.HOSTNAME. Sem isto fixado, o container acaba a bindar só à
    # interface da rede para a qual o hostname do container resolve em
    # /etc/hosts — normalmente uma única rede, não todas as que o container
    # está ligado. Como o nginx só está nas outras redes, a ligação dele ao
    # web falha com "connection refused" (502). Forçar 0.0.0.0 faz o server
    # escutar em todas as interfaces, independentemente da rede/hostname.
    environment:
      HOSTNAME: "0.0.0.0"
    # default + ssrf_proxy_network mantêm as redes originais do web no
    # compose da Dify; dify-otel-net não é estritamente necessária aqui (o
    # web não fala com o collector), mas é a configuração validada em
    # produção — mantida por paridade com o que já correu com sucesso.
    networks:
      - default
      - ssrf_proxy_network
      - dify-otel-net

  api:
    networks:
      - dify-otel-net

  worker:
    networks:
      - dify-otel-net

networks:
  dify-otel-net:
    external: true
    name: dify-otel-net
